{% extends "api/base.html" %}

{% block content %}
    <h1>Shorten a URL</h1>
    <p>Paste your long URL below to create a concise, shareable link.</p>
    
    <form class="shorten-form" action="{% url 'api:create_short_url' %}" method="post">
        {% csrf_token %}
        <input type="text" name="original_url" placeholder="https://example.com/very/long/path..." required>
        <button type="submit">Shorten</button>
    </form>
{% endblock %}
